<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Enhanced</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --secondary: #2563eb;
            --accent: #ec4899;
            --bg-dark: #0f172a;
            --bg-darker: #0a0e27;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* LOGIN SCREEN */
        .login-container {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .login-container.active {
            display: flex;
        }

        .login-box {
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .language-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: rgba(51, 65, 85, 0.5);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .password-field {
            position: relative;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }

        .form-toggle {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-toggle button {
            background: none;
            color: var(--primary);
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .form-toggle button:hover {
            color: var(--accent);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #86efac;
        }

        .demo-info {
            margin-top: 24px;
            padding: 12px 16px;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 10px;
            font-size: 12px;
        }

        .demo-info strong {
            color: var(--text-primary);
        }

        /* MAIN APP */
        .app-container {
            display: none;
            height: 100vh;
            display: flex;
            gap: 0;
        }

        .app-container.active {
            display: flex;
        }

        /* LEFT SIDEBAR */
        .sidebar-left {
            width: 80px;
            background: linear-gradient(180deg, #0a0e27 0%, #0f172a 100%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 12px;
            overflow-y: auto;
        }

        .server-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(51, 65, 85, 0.5);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
            position: relative;
        }

        .server-btn:hover {
            transform: scale(1.05);
            background: rgba(124, 58, 237, 0.5);
        }

        .server-btn.active {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .divider {
            width: 32px;
            height: 2px;
            background: rgba(124, 58, 237, 0.3);
            border-radius: 1px;
        }

        /* CENTER SIDEBAR */
        .sidebar-center {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .channel-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .channel-item:hover {
            background: rgba(124, 58, 237, 0.2);
            color: var(--text-primary);
        }

        .channel-item.active {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(37, 99, 235, 0.3));
            color: var(--text-primary);
            font-weight: 600;
        }

        .members-section {
            padding: 12px;
            border-top: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }

        .members-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
        }

        .member-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .member-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--bg-card);
        }

        .member-status.online {
            background: var(--success);
        }

        .member-status.away {
            background: var(--warning);
        }

        .member-status.offline {
            background: var(--text-muted);
        }

        /* MAIN CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .chat-header {
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-title {
            font-size: 16px;
            font-weight: 700;
        }

        .chat-header-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state-desc {
            color: var(--text-muted);
            font-size: 14px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
            position: relative;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            font-size: 14px;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .message-edited {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
        }

        .message-text {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-actions {
            position: absolute;
            top: -8px;
            right: -8px;
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: rgba(124, 58, 237, 0.2);
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
        }

        .reactions-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .reaction-btn {
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reaction-btn:hover {
            background: rgba(124, 58, 237, 0.4);
            border-color: var(--primary);
        }

        /* MESSAGE INPUT */
        .input-area {
            padding: 16px 24px 24px;
            display: flex;
            gap: 12px;
        }

        .input-field {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 12px;
            transition: all 0.3s ease;
        }

        .input-field:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .input-field input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 14px;
        }

        .input-field input::placeholder {
            color: var(--text-muted);
        }

        .input-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
            padding: 4px;
        }

        .input-icon:hover {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        /* RIGHT SIDEBAR */
        .sidebar-right {
            width: 280px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-profile {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(124, 58, 237, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .user-info h3 {
            font-size: 14px;
            font-weight: 700;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-buttons {
            display: flex;
            gap: 8px;
        }

        .status-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(51, 65, 85, 0.5);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .status-btn.active {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border-color: var(--primary);
            color: white;
        }

        .status-btn.online.active {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .status-btn.away.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .friends-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            padding: 0 4px;
            letter-spacing: 1px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .friend-item:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .friend-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }

        .friend-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .friend-status {
            font-size: 11px;
            color: var(--text-muted);
        }

        .logout-btn {
            margin: 12px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.5);
        }

        /* RESPONSIVE */
        @media (max-width: 1400px) {
            .sidebar-right {
                width: 240px;
            }
            .sidebar-center {
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-container active" id="loginContainer">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">💬</div>
                <h1>Discord</h1>
                <p>Chat, Talk, Collaborate</p>
            </div>

            <div class="language-toggle">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('vi')">VI</button>
            </div>

            <div id="alertContainer"></div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-field">
                        <input type="password" id="loginPassword" placeholder="••••••••">
                        <button class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">👁️</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="handleLogin()">Login</button>
                <div class="form-toggle">
                    <p>Don't have an account?</p>
                    <button onclick="switchToRegister()">Register</button>
                </div>
                <div class="demo-info">
                    <strong>Demo Account:</strong> alice@example.com / 123456
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-field">
                        <input type="password" id="registerPassword" placeholder="At least 6 characters">
                        <button class="password-toggle" onclick="togglePasswordVisibility('registerPassword')">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">Confirm Password</label>
                    <div class="password-field">
                        <input type="password" id="registerPasswordConfirm" placeholder="Confirm password">
                        <button class="password-toggle" onclick="togglePasswordVisibility('registerPasswordConfirm')">👁️</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="handleRegister()">Register</button>
                <div class="form-toggle">
                    <p>Already have an account?</p>
                    <button onclick="switchToLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="appContainer">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar-left" id="sidebarLeft">
            <button class="server-btn active" onclick="selectHome()">💬</button>
            <div class="divider"></div>
            <div id="serversList"></div>
            <button class="server-btn" onclick="openServerCreateModal()" title="Create Server">➕</button>
        </div>

        <!-- CENTER SIDEBAR -->
        <div class="sidebar-center" id="sidebarCenter">
            <div class="sidebar-header" id="sidebarHeader" style="display: none;">
                <h2><span id="serverIcon"></span> <span id="serverName"></span></h2>
                <button class="input-icon" onclick="toggleChannelCreate()">⋮</button>
            </div>

            <div class="channels-list" id="channelsList"></div>

            <div class="members-section" id="membersSection" style="display: none;">
                <div class="members-title">Members</div>
                <div id="membersList"></div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <span id="channelIcon" style="font-size: 20px;"></span>
                    <div>
                        <div class="chat-header-title" id="channelName"></div>
                        <div class="chat-header-desc" id="channelDesc"></div>
                    </div>
                </div>
                <button class="input-icon" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">👋</div>
                    <div class="empty-state-title">Select a Chat</div>
                    <div class="empty-state-desc">Choose a server and channel to start chatting</div>
                </div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-field">
                    <button class="input-icon">➕</button>
                    <input type="text" id="messageInput" placeholder="Message here..." onkeypress="handleMessageKeyPress(event)">
                    <button class="input-icon">😊</button>
                </div>
                <button class="send-btn" onclick="handleSendMessage()">📤</button>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="sidebar-right" id="sidebarRight">
            <div class="user-profile">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-info">
                        <h3 id="userName"></h3>
                        <p id="userBadge"></p>
                    </div>
                    <button class="input-icon" onclick="openSettings()">⚙️</button>
                </div>
                <div class="status-buttons">
                    <button class="status-btn online active" onclick="setStatus('online')">● Online</button>
                    <button class="status-btn away" onclick="setStatus('away')">⊘ Away</button>
                </div>
            </div>

            <div class="friends-list">
                <div class="friends-title">Friends</div>
                <div id="friendsList"></div>
            </div>

            <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="serverCreateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create Server</h2>
                <button class="modal-close" onclick="closeServerCreateModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="serverNameInput">Server Name</label>
                    <input type="text" id="serverNameInput" placeholder="My Awesome Server">
                </div>
                <button class="btn-primary" onclick="createServer()">Create Server</button>
            </div>
        </div>
    </div>

    <div class="modal" id="channelCreateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">New Channel</h2>
                <button class="modal-close" onclick="closeChannelCreateModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="channelNameInput">Channel Name</label>
                    <input type="text" id="channelNameInput" placeholder="general">
                </div>
                <div class="form-group">
                    <label>Channel Type</label>
                    <div style="display: flex; gap: 8px;">
                        <button class="status-btn active" onclick="setChannelType('text')" style="flex: 1;">📝 Text</button>
                        <button class="status-btn" onclick="setChannelType('voice')" style="flex: 1;">🎙️ Voice</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="createChannel()">Create Channel</button>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Language</label>
                    <div style="display: flex; gap: 8px;">
                        <button class="status-btn active" onclick="setLanguage('en')" style="flex: 1;">🇺🇸 English</button>
                        <button class="status-btn" onclick="setLanguage('vi')" style="flex: 1;">🇻🇳 Việt</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="addFriendEmail">Add Friend</label>
                    <input type="email" id="addFriendEmail" placeholder="friend@example.com">
                    <button class="btn-primary" style="margin-top: 8px;" onclick="handleAddFriend()">Add Friend</button>
                </div>
                <div id="settingsAlert"></div>
            </div>
        </div>
    </div>

    <script>
        // TRANSLATIONS
        const translations = {
            en: {
                email: 'Email',
                password: 'Password',
                fullName: 'Full Name',
                confirmPassword: 'Confirm Password',
                login: 'Login',
                register: 'Register',
                selectChat: 'Select a Chat',
                messageHere: 'Message here...',
                friends: 'Friends',
                online: 'Online',
                offline: 'Offline',
                away: 'Away',
                noFriends: 'No friends',
                edited: 'edited',
            },
            vi: {
                email: 'Email',
                password: 'Mật khẩu',
                fullName: 'Họ và tên',
                confirmPassword: 'Xác nhận mật khẩu',
                login: 'Đăng nhập',
                register: 'Đăng ký',
                selectChat: 'Chọn cuộc trò chuyện',
                messageHere: 'Nhắn tin tại đây...',
                friends: 'Bạn bè',
                online: 'Online',
                offline: 'Offline',
                away: 'Đang bận',
                noFriends: 'Chưa có bạn bè',
                edited: 'Đã sửa',
            }
        };

        let currentLanguage = 'en';
        let currentUser = null;
        let allUsers = [];
        let servers = [];
        let activeServer = null;
        let activeChannel = null;
        let messages = {};
        let friends = [];
        let userStatus = 'online';
        let currentChannelType = 'text';

        // INITIALIZATION
        function initializeApp() {
            // Load or create sample users
            const existingUsers = localStorage.getItem('users');
            if (!existingUsers) {
                const sampleUsers = [
                    {
                        id: 1,
                        email: 'alice@example.com',
                        password: '123456',
                        name: 'Alice Nguyễn',
                        avatar: '👩',
                        status: 'online',
                        badge: 'Developer',
                        friends: [2, 3]
                    },
                    {
                        id: 2,
                        email: 'bob@example.com',
                        password: '123456',
                        name: 'Bob Trần',
                        avatar: '👨',
                        status: 'online',
                        badge: 'Designer',
                        friends: [1]
                    },
                    {
                        id: 3,
                        email: 'carol@example.com',
                        password: '123456',
                        name: 'Carol Lê',
                        avatar: '👩‍🦰',
                        status: 'away',
                        badge: 'Artist',
                        friends: [1]
                    }
                ];
                localStorage.setItem('users', JSON.stringify(sampleUsers));
                allUsers = sampleUsers;
            } else {
                allUsers = JSON.parse(existingUsers);
            }

            // Check if already logged in
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                currentUser = JSON.parse(loggedInUser);
                loginSuccess();
            }
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const isPassword = field.type === 'password';
            field.type = isPassword ? 'text' : 'password';
        }

        function switchToRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function switchToLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer') || document.getElementById('settingsAlert');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showAlert('Please enter email and password');
                return;
            }

            const user = allUsers.find(u => u.email === email && u.password === password);
            if (!user) {
                showAlert('Invalid email or password');
                return;
            }

            currentUser = user;
            localStorage.setItem('loggedInUser', JSON.stringify(user));
            loginSuccess();
        }

        function handleRegister() {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerPasswordConfirm').value.trim();

            if (!name || !email || !password || !confirmPassword) {
                showAlert('Please fill all fields');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters');
                return;
            }

            if (allUsers.find(u => u.email === email)) {
                showAlert('Email already registered');
                return;
            }

            const badges = ['Developer', 'Designer', 'Artist', 'Gamer'];
            const avatars = ['👩', '👨', '👩‍🦰', '👨‍💼'];

            const newUser = {
                id: Date.now(),
                email: email,
                password: password,
                name: name,
                avatar: avatars[Math.floor(Math.random() * avatars.length)],
                status: 'online',
                badge: badges[Math.floor(Math.random() * badges.length)],
                friends: []
            };

            allUsers.push(newUser);
            localStorage.setItem('users', JSON.stringify(allUsers));
            showAlert('Registration successful! Please login', 'success');
            
            setTimeout(() => {
                document.getElementById('registerName').value = '';
                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('registerPasswordConfirm').value = '';
                switchToLogin();
            }, 1500);
        }

        function loginSuccess() {
            loadUserFriends();
            loadUserServers();
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('appContainer').classList.add('active');
            renderUserProfile();
            renderFriends();
        }

        function loadUserFriends() {
            const user = allUsers.find(u => u.id === currentUser.id);
            if (user && user.friends && user.friends.length > 0) {
                friends = allUsers.filter(u => user.friends.includes(u.id));
            } else {
                friends = [];
            }
        }

        function loadUserServers() {
            const saved = localStorage.getItem('user_servers');
            if (saved) {
                servers = JSON.parse(saved);
            } else {
                servers = [
                    {
                        id: 1,
                        name: 'Code Masters',
                        icon: '💻',
                        owner: 1,
                        channels: [
                            { id: 11, name: 'general', type: 'text' },
                            { id: 12, name: 'announcements', type: 'text' },
                            { id: 13, name: 'voice-dev', type: 'voice' }
                        ],
                        members: [1, 2, 3]
                    },
                    {
                        id: 2,
                        name: 'Design Squad',
                        icon: '🎨',
                        owner: 2,
                        channels: [
                            { id: 21, name: 'design-talk', type: 'text' },
                            { id: 22, name: 'ui-ux', type: 'text' }
                        ],
                        members: [1, 2, 3]
                    }
                ];
                localStorage.setItem('user_servers', JSON.stringify(servers));
            }
            renderServers();
        }

        function renderServers() {
            const serversList = document.getElementById('serversList');
            serversList.innerHTML = '';
            servers.forEach(server => {
                const btn = document.createElement('button');
                btn.className = `server-btn ${activeServer?.id === server.id ? 'active' : ''}`;
                btn.textContent = server.icon;
                btn.title = server.name;
                btn.onclick = () => selectServer(server);
                serversList.appendChild(btn);
            });
        }

        function selectHome() {
            activeServer = null;
            activeChannel = null;
            document.getElementById('sidebarCenter').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">👋</div>
                    <div class="empty-state-title">Welcome</div>
                    <div class="empty-state-desc">Select a server to get started</div>
                </div>
            `;
            document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.server-btn').classList.add('active');
        }

        function selectServer(server) {
            activeServer = server;
            if (server.channels && server.channels.length > 0) {
                selectChannel(server.channels[0]);
            }
            renderChannels();
            renderMembers();
            document.getElementById('sidebarCenter').style.display = 'flex';
            document.getElementById('sidebarHeader').style.display = 'flex';
            renderServers();
        }

        function renderChannels() {
            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = '';
            
            if (!activeServer || !activeServer.channels) return;

            activeServer.channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = `channel-item ${activeChannel?.id === channel.id ? 'active' : ''}`;
                btn.innerHTML = `
                    <span>${channel.type === 'text' ? '📝' : '🎙️'}</span>
                    <span>${channel.name}</span>
                `;
                btn.onclick = () => selectChannel(channel);
                channelsList.appendChild(btn);
            });
        }

        function selectChannel(channel) {
            activeChannel = channel;
            loadChannelMessages();
            renderChannels();
            updateChatHeader();
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
        }

        function loadChannelMessages() {
            const chatKey = `${activeServer.id}_${activeChannel.id}`;
            const saved = localStorage.getItem(`messages_${chatKey}`);
            if (saved) {
                messages[chatKey] = JSON.parse(saved);
            } else {
                messages[chatKey] = [];
            }
            renderMessages();
        }

        function updateChatHeader() {
            document.getElementById('serverIcon').textContent = activeServer?.icon || '';
            document.getElementById('serverName').textContent = activeServer?.name || '';
            document.getElementById('channelIcon').textContent = activeChannel?.type === 'text' ? '📝' : '🎙️';
            document.getElementById('channelName').textContent = activeChannel?.name || '';
            document.getElementById('channelDesc').textContent = 
                activeChannel?.type === 'text' 
                    ? `${activeServer?.members?.length || 0} members`
                    : 'Voice Channel';
        }

        function renderChannels() {
            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = '';
            
            if (!activeServer || !activeServer.channels) return;

            activeServer.channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = `channel-item ${activeChannel?.id === channel.id ? 'active' : ''}`;
                btn.innerHTML = `
                    <span>${channel.type === 'text' ? '📝' : '🎙️'}</span>
                    <span>${channel.name}</span>
                `;
                btn.onclick = () => selectChannel(channel);
                channelsList.appendChild(btn);
            });
        }

        function renderMembers() {
            const membersList = document.getElementById('membersList');
            membersList.innerHTML = '';
            document.getElementById('membersSection').style.display = 'block';

            if (!activeServer || !activeServer.members) return;

            activeServer.members.forEach(memberId => {
                const member = allUsers.find(u => u.id === memberId);
                if (!member) return;

                const item = document.createElement('div');
                item.className = 'member-item';
                item.innerHTML = `
                    <div class="member-avatar">
                        ${member.avatar}
                        <div class="member-status ${member.status}"></div>
                    </div>
                    <div>
                        <div class="friend-name">${member.name}</div>
                        <div class="friend-status">${member.status === 'online' ? translations[currentLanguage].online : translations[currentLanguage].offline}</div>
                    </div>
                `;
                membersList.appendChild(item);
            });
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const chatKey = `${activeServer.id}_${activeChannel.id}`;
            const chatMessages = messages[chatKey] || [];

            if (chatMessages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👋</div>
                        <div class="empty-state-title">No messages yet</div>
                        <div class="empty-state-desc">Start the conversation!</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            chatMessages.forEach(msg => {
                const messageEl = document.createElement('div');
                messageEl.className = 'message';
                messageEl.innerHTML = `
                    <div class="message-avatar">${msg.senderAvatar}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${msg.senderName}</span>
                            <span class="message-time">${msg.time}</span>
                            ${msg.edited ? `<span class="message-edited">(${translations[currentLanguage].edited})</span>` : ''}
                        </div>
                        <p class="message-text">${msg.text}</p>
                        ${msg.reactions && Object.keys(msg.reactions).length > 0 ? `
                            <div class="reactions-container">
                                ${Object.entries(msg.reactions).map(([emoji, data]) => `
                                    <button class="reaction-btn">${emoji} ${data.count}</button>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(messageEl);
            });
            container.scrollTop = container.scrollHeight;
        }

        function handleMessageKeyPress(event) {
            if (event.key === 'Enter') {
                handleSendMessage();
            }
        }

        function handleSendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !activeChannel || !activeServer) return;

            const chatKey = `${activeServer.id}_${activeChannel.id}`;
            const message = {
                id: Date.now(),
                text: text,
                senderId: currentUser.id,
                senderName: currentUser.name,
                senderAvatar: currentUser.avatar,
                time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                edited: false,
                reactions: {}
            };

            if (!messages[chatKey]) {
                messages[chatKey] = [];
            }
            messages[chatKey].push(message);
            localStorage.setItem(`messages_${chatKey}`, JSON.stringify(messages[chatKey]));

            input.value = '';
            renderMessages();
        }

        function renderUserProfile() {
            document.getElementById('userAvatar').textContent = currentUser.avatar;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userBadge').textContent = currentUser.badge;
        }

        function renderFriends() {
            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = '';

            if (friends.length === 0) {
                friendsList.innerHTML = `<p style="font-size: 13px; color: var(--text-muted);">${translations[currentLanguage].noFriends}</p>`;
                return;
            }

            friends.forEach(friend => {
                const item = document.createElement('div');
                item.className = 'friend-item';
                item.innerHTML = `
                    <div class="friend-avatar">
                        ${friend.avatar}
                        <div class="member-status ${friend.status}"></div>
                    </div>
                    <div style="flex: 1;">
                        <div class="friend-name">${friend.name}</div>
                        <div class="friend-status">${friend.status === 'online' ? translations[currentLanguage].online : translations[currentLanguage].offline}</div>
                    </div>
                `;
                friendsList.appendChild(item);
            });
        }

        function setStatus(status) {
            userStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function handleAddFriend() {
            const email = document.getElementById('addFriendEmail').value.trim();

            if (!email) {
                showAlert('Please enter friend email');
                return;
            }

            const friendUser = allUsers.find(u => u.email === email);
            if (!friendUser) {
                showAlert('User not found');
                return;
            }

            if (friendUser.id === currentUser.id) {
                showAlert('Cannot add yourself');
                return;
            }

            if (friends.find(f => f.id === friendUser.id)) {
                showAlert('Already friends');
                return;
            }

            // Update friendships
            const updatedUsers = allUsers.map(u => {
                if (u.id === currentUser.id) {
                    return { ...u, friends: [...(u.friends || []), friendUser.id] };
                }
                if (u.id === friendUser.id) {
                    return { ...u, friends: [...(u.friends || []), currentUser.id] };
                }
                return u;
            });

            allUsers = updatedUsers;
            localStorage.setItem('users', JSON.stringify(updatedUsers));

            currentUser = { ...currentUser, friends: [...(currentUser.friends || []), friendUser.id] };
            localStorage.setItem('loggedInUser', JSON.stringify(currentUser));

            friends.push(friendUser);
            renderFriends();
            document.getElementById('addFriendEmail').value = '';
            showAlert('Friend added!', 'success');
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('loggedInUser');
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginContainer').classList.add('active');
            document.getElementById('messageInput').value = '';
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }

        function openServerCreateModal() {
            document.getElementById('serverCreateModal').classList.add('active');
        }

        function closeServerCreateModal() {
            document.getElementById('serverCreateModal').classList.remove('active');
            document.getElementById('serverNameInput').value = '';
        }

        function createServer() {
            const name = document.getElementById('serverNameInput').value.trim();
            if (!name) {
                showAlert('Server name required');
                return;
            }

            const newServer = {
                id: Date.now(),
                name: name,
                icon: '💻',
                owner: currentUser.id,
                channels: [
                    { id: Date.now() + 1, name: 'general', type: 'text' },
                    { id: Date.now() + 2, name: 'voice', type: 'voice' }
                ],
                members: [currentUser.id]
            };

            servers.push(newServer);
            localStorage.setItem('user_servers', JSON.stringify(servers));
            renderServers();
            selectServer(newServer);
            closeServerCreateModal();
        }

        function toggleChannelCreate() {
            document.getElementById('channelCreateModal').classList.add('active');
        }

        function closeChannelCreateModal() {
            document.getElementById('channelCreateModal').classList.remove('active');
            document.getElementById('channelNameInput').value = '';
        }

        function setChannelType(type) {
            currentChannelType = type;
            document.querySelectorAll('#channelCreateModal .status-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function createChannel() {
            const name = document.getElementById('channelNameInput').value.trim();
            if (!name || !activeServer) {
                showAlert('Channel name required');
                return;
            }

            const newChannel = {
                id: Date.now(),
                name: name,
                type: currentChannelType
            };

            const updatedServers = servers.map(s => {
                if (s.id === activeServer.id) {
                    return { ...s, channels: [...s.channels, newChannel] };
                }
                return s;
            });

            servers = updatedServers;
            activeServer = servers.find(s => s.id === activeServer.id);
            localStorage.setItem('user_servers', JSON.stringify(updatedServers));
            renderChannels();
            closeChannelCreateModal();
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // Close modals on background click
        document.addEventListener('click', function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Initialize on load
        window.addEventListener('load', initializeApp);
    </script>
</body>
</html>
