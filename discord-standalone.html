<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Enhanced</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="m-0 p-0">
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef } = React;

        const DiscordApp = () => {
            const [language, setLanguage] = useState('vi');
            const [theme, setTheme] = useState('dark');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showLoginForm, setShowLoginForm] = useState(true);
            const [currentUser, setCurrentUser] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [friends, setFriends] = useState([]);
            const [servers, setServers] = useState([]);
            const [dmConversations, setDmConversations] = useState([]);
            const [activeServer, setActiveServer] = useState(null);
            const [activeChannel, setActiveChannel] = useState(null);
            const [activeDM, setActiveDM] = useState(null);
            const [messages, setMessages] = useState({});
            const [inputMessage, setInputMessage] = useState('');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [userStatus, setUserStatus] = useState('online');
            const [showSettings, setShowSettings] = useState(false);
            const [showServerCreate, setShowServerCreate] = useState(false);
            const [showChannelCreate, setShowChannelCreate] = useState(false);
            const [newServerName, setNewServerName] = useState('');
            const [newChannelName, setNewChannelName] = useState('');
            const [newChannelType, setNewChannelType] = useState('text');
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [replyingToId, setReplyingToId] = useState(null);
            const [showEmojiPicker, setShowEmojiPicker] = useState(null);
            const [messageReactions, setMessageReactions] = useState({});
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
            const [showAddFriend, setShowAddFriend] = useState(false);
            const [addFriendEmail, setAddFriendEmail] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [registerName, setRegisterName] = useState('');
            const [registerEmail, setRegisterEmail] = useState('');
            const [registerPassword, setRegisterPassword] = useState('');
            const [registerPasswordConfirm, setRegisterPasswordConfirm] = useState('');
            const [showRegisterPassword, setShowRegisterPassword] = useState(false);
            const messagesEndRef = useRef(null);

            const translations = {
                vi: {
                    login: 'Đăng nhập', register: 'Đăng ký', logout: 'Đăng xuất',
                    email: 'Email', password: 'Mật khẩu', fullName: 'Họ và tên',
                    confirmPassword: 'Xác nhận mật khẩu', serverName: 'Tên máy chủ',
                    channelName: 'Tên kênh', messageHere: 'Gửi tin nhắn...',
                    directMessages: 'TIN NHẮN TRỰC TIẾP', servers: 'MÁY CHỦ',
                    friends: 'Bạn bè', online: 'Online', offline: 'Offline', away: 'Đang bận',
                    addFriend: 'Thêm bạn bè', channels: 'KÊNH', text: 'Văn bản',
                    voice: 'Thoại', members: 'THÀNH VIÊN', settings: 'Cài đặt',
                    createServer: 'Tạo máy chủ', newChannel: 'Kênh mới',
                    invalidCredentials: 'Email hoặc mật khẩu không chính xác',
                    emailExists: 'Email đã được đăng ký', fillAllFields: 'Vui lòng điền tất cả',
                    passwordMismatch: 'Mật khẩu không khớp', passwordMinLength: 'Tối thiểu 6 ký tự',
                    registerSuccess: 'Đăng ký thành công!', demoAccount: 'Demo: alice@example.com / 123456',
                    selectChat: 'Chọn cuộc trò chuyện', emptyEmail: 'Vui lòng nhập email và mật khẩu',
                    emailNotFound: 'Email không tồn tại', selfAdd: 'Không thể tự thêm', alreadyFriend: 'Đã là bạn',
                    addFriendSuccess: 'Đã thêm bạn', messageDeleted: 'Tin nhắn đã xóa', messageEdited: 'Đã chỉnh sửa',
                    edit: 'Sửa', delete: 'Xóa', reply: 'Trả lời', theme: 'Giao diện', darkMode: 'Tối',
                    lightMode: 'Sáng', language: 'Ngôn ngữ', connected: 'Đã kết nối',
                    onlineNow: 'Online', noFriends: 'Chưa có bạn bè', sendMessage: 'Gửi lời mời',
                    friendEmail: 'Email bạn',
                },
                en: {
                    login: 'Login', register: 'Register', logout: 'Logout',
                    email: 'Email', password: 'Password', fullName: 'Full Name',
                    confirmPassword: 'Confirm Password', serverName: 'Server Name',
                    channelName: 'Channel Name', messageHere: 'Message here...',
                    directMessages: 'DIRECT MESSAGES', servers: 'SERVERS',
                    friends: 'Friends', online: 'Online', offline: 'Offline', away: 'Away',
                    addFriend: 'Add Friend', channels: 'CHANNELS', text: 'Text',
                    voice: 'Voice', members: 'MEMBERS', settings: 'Settings',
                    createServer: 'Create Server', newChannel: 'New Channel',
                    invalidCredentials: 'Invalid email or password',
                    emailExists: 'Email already registered', fillAllFields: 'Please fill all fields',
                    passwordMismatch: 'Passwords do not match', passwordMinLength: 'At least 6 characters',
                    registerSuccess: 'Registration successful!', demoAccount: 'Demo: alice@example.com / 123456',
                    selectChat: 'Select a chat', emptyEmail: 'Please enter email and password',
                    emailNotFound: 'Email not found', selfAdd: 'Cannot add yourself', alreadyFriend: 'Already friends',
                    addFriendSuccess: 'Friend added', messageDeleted: 'Message deleted', messageEdited: 'Message edited',
                    edit: 'Edit', delete: 'Delete', reply: 'Reply', theme: 'Theme', darkMode: 'Dark',
                    lightMode: 'Light', language: 'Language', connected: 'Connected',
                    onlineNow: 'Online Now', noFriends: 'No friends yet', sendMessage: 'Send Invite',
                    friendEmail: 'Friend Email',
                }
            };

            const t = (key) => translations[language][key] || key;
            const emojis = ['😊', '😍', '😂', '🤔', '😮', '🎉', '👍', '❤️', '🔥', '⭐'];

            useEffect(() => {
                const existingUsers = localStorage.getItem('users');
                if (!existingUsers) {
                    const sampleUsers = [
                        { id: 1, email: 'alice@example.com', password: '123456', name: 'Alice Nguyễn',
                          avatar: '👩‍💻', status: 'online', badge: 'Developer', friends: [2, 3],
                          joinedDate: '2023-01-15', bio: 'Full Stack Developer' },
                        { id: 2, email: 'bob@example.com', password: '123456', name: 'Bob Trần',
                          avatar: '🎨', status: 'online', badge: 'Designer', friends: [1],
                          joinedDate: '2023-02-20', bio: 'UI/UX Designer' },
                        { id: 3, email: 'carol@example.com', password: '123456', name: 'Carol Lê',
                          avatar: '🎭', status: 'away', badge: 'Artist', friends: [1],
                          joinedDate: '2023-03-10', bio: 'Digital Artist' },
                    ];
                    localStorage.setItem('users', JSON.stringify(sampleUsers));
                    setAllUsers(sampleUsers);
                } else {
                    setAllUsers(JSON.parse(existingUsers));
                }

                const loggedInUser = localStorage.getItem('loggedInUser');
                if (loggedInUser) {
                    const user = JSON.parse(loggedInUser);
                    setCurrentUser(user);
                    setIsLoggedIn(true);
                    setShowLoginForm(false);
                    loadUserFriends(user.id);
                    loadUserServers();
                    loadDMConversations(user.id);
                }

                const savedTheme = localStorage.getItem('theme') || 'dark';
                setTheme(savedTheme);
            }, []);

            useEffect(() => {
                localStorage.setItem('theme', theme);
            }, [theme]);

            const loadUserServers = () => {
                const saved = localStorage.getItem('user_servers');
                if (saved) {
                    setServers(JSON.parse(saved));
                } else {
                    const defaultServers = [
                        { id: 1, name: 'Code Masters', icon: '💻', owner: 1,
                          channels: [
                            { id: 11, name: 'general', type: 'text' },
                            { id: 12, name: 'announcements', type: 'text' },
                            { id: 13, name: 'voice-dev', type: 'voice' },
                          ],
                          members: [1, 2, 3], isFavorite: true },
                        { id: 2, name: 'Design Squad', icon: '🎨',
                          owner: 2,
                          channels: [
                            { id: 21, name: 'design-talk', type: 'text' },
                            { id: 22, name: 'ui-ux', type: 'text' },
                          ],
                          members: [1, 2, 3], isFavorite: false },
                    ];
                    localStorage.setItem('user_servers', JSON.stringify(defaultServers));
                    setServers(defaultServers);
                }
            };

            const loadUserFriends = (userId) => {
                const usersList = JSON.parse(localStorage.getItem('users'));
                const user = usersList.find((u) => u.id === userId);
                if (user && user.friends && user.friends.length > 0) {
                    const userFriends = usersList.filter((u) => user.friends.includes(u.id));
                    setFriends(userFriends);
                }
            };

            const loadDMConversations = (userId) => {
                const saved = localStorage.getItem(`dm_conversations_${userId}`);
                if (saved) {
                    setDmConversations(JSON.parse(saved));
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                if (!loginEmail || !loginPassword) {
                    setError(t('emptyEmail'));
                    return;
                }
                const user = allUsers.find(
                    (u) => u.email === loginEmail && u.password === loginPassword
                );
                if (!user) {
                    setError(t('invalidCredentials'));
                    return;
                }
                setCurrentUser(user);
                setIsLoggedIn(true);
                setShowLoginForm(false);
                localStorage.setItem('loggedInUser', JSON.stringify(user));
                loadUserFriends(user.id);
                loadUserServers();
                loadDMConversations(user.id);
            };

            const handleRegister = (e) => {
                e.preventDefault();
                setError('');
                if (!registerName || !registerEmail || !registerPassword || !registerPasswordConfirm) {
                    setError(t('fillAllFields'));
                    return;
                }
                if (registerPassword !== registerPasswordConfirm) {
                    setError(t('passwordMismatch'));
                    return;
                }
                if (registerPassword.length < 6) {
                    setError(t('passwordMinLength'));
                    return;
                }
                if (allUsers.find((u) => u.email === registerEmail)) {
                    setError(t('emailExists'));
                    return;
                }

                const badges = ['Developer', 'Designer', 'Artist', 'Gamer'];
                const avatars = ['👨‍💻', '🎨', '🎭', '🎮'];
                const newUser = {
                    id: Date.now(),
                    email: registerEmail,
                    password: registerPassword,
                    name: registerName,
                    avatar: avatars[Math.floor(Math.random() * avatars.length)],
                    status: 'online',
                    friends: [],
                    badge: badges[Math.floor(Math.random() * badges.length)],
                    joinedDate: new Date().toISOString().split('T')[0],
                    bio: 'New member'
                };

                const updatedUsers = [...allUsers, newUser];
                setAllUsers(updatedUsers);
                localStorage.setItem('users', JSON.stringify(updatedUsers));
                setSuccess(t('registerSuccess'));
                setTimeout(() => {
                    setRegisterName('');
                    setRegisterEmail('');
                    setRegisterPassword('');
                    setRegisterPasswordConfirm('');
                    setShowLoginForm(true);
                }, 1500);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser(null);
                setShowLoginForm(true);
                setFriends([]);
                setMessages({});
                setActiveChannel(null);
                setActiveServer(null);
                setActiveDM(null);
                localStorage.removeItem('loggedInUser');
            };

            const handleAddFriend = (e) => {
                e.preventDefault();
                setError('');
                if (!addFriendEmail) {
                    setError(t('friendEmail'));
                    return;
                }
                const friendUser = allUsers.find((u) => u.email === addFriendEmail);
                if (!friendUser) {
                    setError(t('emailNotFound'));
                    return;
                }
                if (friendUser.id === currentUser.id) {
                    setError(t('selfAdd'));
                    return;
                }
                if (friends.find((f) => f.id === friendUser.id)) {
                    setError(t('alreadyFriend'));
                    return;
                }

                const updatedUsers = allUsers.map((u) => {
                    if (u.id === currentUser.id) {
                        return { ...u, friends: [...(u.friends || []), friendUser.id] };
                    }
                    if (u.id === friendUser.id) {
                        return { ...u, friends: [...(u.friends || []), currentUser.id] };
                    }
                    return u;
                });

                setAllUsers(updatedUsers);
                localStorage.setItem('users', JSON.stringify(updatedUsers));
                setFriends([...friends, friendUser]);
                setAddFriendEmail('');
                setShowAddFriend(false);
                setSuccess(t('addFriendSuccess'));
                setTimeout(() => setSuccess(''), 2000);
            };

            const startDMConversation = (friendId) => {
                const friend = friends.find(f => f.id === friendId);
                if (friend) {
                    const conversationId = `dm_${Math.min(currentUser.id, friendId)}_${Math.max(currentUser.id, friendId)}`;
                    if (!dmConversations.find(c => c.id === conversationId)) {
                        const newConversation = { id: conversationId, userId: friendId, userName: friend.name, avatar: friend.avatar };
                        const updated = [...dmConversations, newConversation];
                        setDmConversations(updated);
                        localStorage.setItem(`dm_conversations_${currentUser.id}`, JSON.stringify(updated));
                    }
                    setActiveDM(friendId);
                    setActiveServer(null);
                    setActiveChannel(null);
                    loadDMMessages(friendId);
                }
            };

            const loadDMMessages = (friendId) => {
                const dmKey = `dm_${Math.min(currentUser.id, friendId)}_${Math.max(currentUser.id, friendId)}`;
                const savedMessages = localStorage.getItem(`messages_${dmKey}`);
                if (savedMessages) {
                    setMessages((prev) => ({
                        ...prev,
                        [dmKey]: JSON.parse(savedMessages),
                    }));
                }
            };

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (!inputMessage.trim()) return;

                let chatKey;
                if (activeDM) {
                    chatKey = `dm_${Math.min(currentUser.id, activeDM)}_${Math.max(currentUser.id, activeDM)}`;
                } else if (activeChannel && activeServer) {
                    chatKey = `${activeServer.id}_${activeChannel.id}`;
                } else {
                    return;
                }

                const newMessage = {
                    id: Date.now(),
                    text: inputMessage,
                    senderId: currentUser.id,
                    senderName: currentUser.name,
                    senderAvatar: currentUser.avatar,
                    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: new Date().toISOString(),
                    edited: false,
                    replyTo: replyingToId || null,
                };

                const updatedMessages = [...(messages[chatKey] || []), newMessage];
                setMessages((prev) => ({
                    ...prev,
                    [chatKey]: updatedMessages,
                }));
                localStorage.setItem(`messages_${chatKey}`, JSON.stringify(updatedMessages));
                setInputMessage('');
                setReplyingToId(null);
            };

            const deleteMessage = (messageId) => {
                let chatKey;
                if (activeDM) {
                    chatKey = `dm_${Math.min(currentUser.id, activeDM)}_${Math.max(currentUser.id, activeDM)}`;
                } else if (activeChannel && activeServer) {
                    chatKey = `${activeServer.id}_${activeChannel.id}`;
                } else {
                    return;
                }

                const updatedMessages = (messages[chatKey] || []).filter(m => m.id !== messageId);
                setMessages((prev) => ({
                    ...prev,
                    [chatKey]: updatedMessages,
                }));
                localStorage.setItem(`messages_${chatKey}`, JSON.stringify(updatedMessages));
                setShowDeleteConfirm(null);
            };

            const addReaction = (messageId, emoji) => {
                const key = `${messageId}_reactions`;
                const currentReactions = messageReactions[key] || {};
                const updatedReactions = { ...currentReactions };
                if (updatedReactions[emoji]) {
                    updatedReactions[emoji].count += 1;
                } else {
                    updatedReactions[emoji] = { count: 1 };
                }
                setMessageReactions((prev) => ({
                    ...prev,
                    [key]: updatedReactions,
                }));
                setShowEmojiPicker(null);
            };

            const loadChannelMessages = (server, channel) => {
                const chatKey = `${server.id}_${channel.id}`;
                const savedMessages = localStorage.getItem(`messages_${chatKey}`);
                if (savedMessages) {
                    setMessages((prev) => ({
                        ...prev,
                        [chatKey]: JSON.parse(savedMessages),
                    }));
                }
                setActiveServer(server);
                setActiveChannel(channel);
                setActiveDM(null);
            };

            const createServer = () => {
                if (!newServerName.trim()) {
                    setError('Server name required');
                    return;
                }
                const newServer = {
                    id: Date.now(),
                    name: newServerName,
                    icon: '🎮',
                    owner: currentUser.id,
                    channels: [
                        { id: Date.now() + 1, name: 'general', type: 'text' },
                        { id: Date.now() + 2, name: 'voice', type: 'voice' },
                    ],
                    members: [currentUser.id],
                    isFavorite: false,
                };
                const updatedServers = [...servers, newServer];
                setServers(updatedServers);
                localStorage.setItem('user_servers', JSON.stringify(updatedServers));
                setNewServerName('');
                setShowServerCreate(false);
                setActiveServer(newServer);
                setActiveChannel(newServer.channels[0]);
            };

            const createChannel = () => {
                if (!newChannelName.trim() || !activeServer) {
                    setError('Channel name required');
                    return;
                }
                const newChannel = {
                    id: Date.now(),
                    name: newChannelName,
                    type: newChannelType,
                };
                const updatedServers = servers.map((s) => {
                    if (s.id === activeServer.id) {
                        return { ...s, channels: [...s.channels, newChannel] };
                    }
                    return s;
                });
                setServers(updatedServers);
                localStorage.setItem('user_servers', JSON.stringify(updatedServers));
                setActiveServer({ ...activeServer, channels: [...activeServer.channels, newChannel] });
                setNewChannelName('');
                setNewChannelType('text');
                setShowChannelCreate(false);
            };

            const bgClass = theme === 'dark' ? 'bg-gray-950' : 'bg-white';
            const sideBgClass = theme === 'dark' ? 'bg-gray-900' : 'bg-gray-100';
            const textClass = theme === 'dark' ? 'text-white' : 'text-gray-900';
            const inputBgClass = theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200';

            if (!isLoggedIn) {
                return (
                    <div className={`min-h-screen ${theme === 'dark' ? 'bg-gradient-to-br from-indigo-950 via-purple-900 to-black' : 'bg-gradient-to-br from-blue-100 to-purple-100'} flex items-center justify-center p-4`}>
                        <div className="w-full max-w-md">
                            <div className={`${sideBgClass} rounded-2xl shadow-2xl border ${theme === 'dark' ? 'border-gray-800' : 'border-gray-300'} p-8`}>
                                <div className="text-center mb-8">
                                    <div className="text-5xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 bg-clip-text text-transparent mb-2">
                                        Discord
                                    </div>
                                    <p className={`${theme === 'dark' ? 'text-gray-400' : 'text-gray-600'}`}>Your Place to Talk</p>
                                </div>

                                <div className="flex gap-2 mb-6 justify-center">
                                    {['vi', 'en'].map((lang) => (
                                        <button
                                            key={lang}
                                            onClick={() => setLanguage(lang)}
                                            className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${
                                                language === lang
                                                    ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg'
                                                    : `${theme === 'dark' ? 'bg-gray-800 text-gray-300 hover:bg-gray-700' : 'bg-gray-300 text-gray-700 hover:bg-gray-400'}`
                                            }`}
                                        >
                                            {lang.toUpperCase()}
                                        </button>
                                    ))}
                                </div>

                                {error && (
                                    <div className={`mb-4 p-4 rounded-lg border text-sm ${theme === 'dark' ? 'bg-red-500/20 border-red-500/50 text-red-300' : 'bg-red-100 border-red-400 text-red-700'}`}>
                                        ❌ {error}
                                    </div>
                                )}
                                {success && (
                                    <div className={`mb-4 p-4 rounded-lg border text-sm ${theme === 'dark' ? 'bg-green-500/20 border-green-500/50 text-green-300' : 'bg-green-100 border-green-400 text-green-700'}`}>
                                        ✅ {success}
                                    </div>
                                )}

                                {showLoginForm ? (
                                    <>
                                        <form onSubmit={handleLogin} className="space-y-4">
                                            <div>
                                                <label className={`block text-sm font-bold ${theme === 'dark' ? 'text-gray-200' : 'text-gray-700'} mb-2`}>
                                                    {t('email')}
                                                </label>
                                                <input
                                                    type="email"
                                                    value={loginEmail}
                                                    onChange={(e) => setLoginEmail(e.target.value)}
                                                    placeholder="you@example.com"
                                                    className={`w-full px-4 py-3 rounded-lg ${inputBgClass} ${theme === 'dark' ? 'border border-gray-700' : 'border border-gray-300'} outline-none focus:ring-2 focus:ring-purple-500 text-white`}
                                                />
                                            </div>
                                            <div>
                                                <label className={`block text-sm font-bold ${theme === 'dark' ? 'text-gray-200' : 'text-gray-700'} mb-2`}>
                                                    {t('password')}
                                                </label>
                                                <div className="relative">
                                                    <input
                                                        type={showPassword ? 'text' : 'password'}
                                                        value={loginPassword}
                                                        onChange={(e) => setLoginPassword(e.target.value)}
                                                        placeholder="••••••••"
                                                        className={`w-full px-4 py-3 rounded-lg ${inputBgClass} ${theme === 'dark' ? 'border border-gray-700' : 'border border-gray-300'} outline-none focus:ring-2 focus:ring-purple-500 text-white`}
                                                    />
                                                    <button
                                                        type="button"
                                                        onClick={() => setShowPassword(!showPassword)}
                                                        className={`absolute right-3 top-3.5 ${theme === 'dark' ? 'text-gray-400' : 'text-gray-600'}`}
                                                    >
                                                        {showPassword ? '👁️‍🗨️' : '🔒'}
                                                    </button>
                                                </div>
                                            </div>
                                            <button
                                                type="submit"
                                                className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white py-3 rounded-lg font-bold transition-all"
                                            >
                                                {t('login')}
                                            </button>
                                        </form>
                                        <div className="mt-6 text-center">
                                            <p className={`${theme === 'dark' ? 'text-gray-400' : 'text-gray-600'} text-sm`}>Don't have an account?</p>
                                            <button
                                                onClick={() => setShowLoginForm(false)}
                                                className="text-purple-400 hover:text-purple-300 font-bold mt-2"
                                            >
                                                {t('register')}
                                            </button>
                                        </div>
                                        <div className={`mt-6 p-4 rounded-lg ${theme === 'dark' ? 'bg-blue-500/10 border border-blue-500/30' : 'bg-blue-100 border border-blue-300'}`}>
                                            <p className={`font-bold mb-1 ${theme === 'dark' ? 'text-blue-400' : 'text-blue-700'}`}>📧 {t('demoAccount')}</p>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <form onSubmit={handleRegister} className="space-y-4">
                                            <div>
                                                <label className={`block text-sm font-bold ${theme === 'dark' ? 'text-gray-200' : 'text-gray-700'} mb-2`}>
                                                    {t('fullName')}
                                                </label>
                                                <input
                                                    type="text"
                                                    value={registerName}
                                                    onChange={(e) => setRegisterName(e.target.value)}
                                                    placeholder="John Doe"

                                        className={`w-full ${inputBgClass} rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-purple-500 ${theme === 'dark' ? 'border border-gray-700 text-white' : 'border border-gray-400 text-gray-900'}`}
                                    />
                                    {error && <div className={`text-sm p-2 rounded ${theme === 'dark' ? 'bg-red-500/20 text-red-300' : 'bg-red-100 text-red-700'}`}>❌ {error}</div>}
                                    {success && <div className={`text-sm p-2 rounded ${theme === 'dark' ? 'bg-green-500/20 text-green-300' : 'bg-green-100 text-green-700'}`}>✅ {success}</div>}
                                    <button
                                        type="submit"
                                        className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white py-2 rounded-lg font-bold"
                                    >
                                        {t('sendMessage')}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className={`${sideBgClass} rounded-xl p-6 w-96 border ${theme === 'dark' ? 'border-gray-700' : 'border-gray-400'}`}>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold">{t('settings')}</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-2xl">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-bold mb-2 ${theme === 'dark' ? 'text-gray-300' : 'text-gray-700'}`}>{t('language')}</label>
                                        <div className="flex gap-2">
                                            {['vi', 'en'].map((lang) => (
                                                <button
                                                    key={lang}
                                                    onClick={() => setLanguage(lang)}
                                                    className={`flex-1 py-2 px-3 rounded-lg text-sm font-bold transition ${
                                                        language === lang
                                                            ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white'
                                                            : `${theme === 'dark' ? 'bg-gray-800 hover:bg-gray-700' : 'bg-gray-300 hover:bg-gray-400'}`
                                                    }`}
                                                >
                                                    {lang === 'vi' ? '🇻🇳 Việt' : '🇬🇧 English'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setShowSettings(false)}
                                        className={`w-full py-2 rounded-lg font-bold transition ${theme === 'dark' ? 'bg-gray-800 hover:bg-gray-700' : 'bg-gray-300 hover:bg-gray-400'}`}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DiscordApp />);
    </script>
</body>
</html>
